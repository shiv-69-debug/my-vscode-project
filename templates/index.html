<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interview Practice — AI-Powered Mock Interviews</title>
  <style>
    /* ============================================================
       CSS Variables & Base
       ============================================================ */
    :root {
      --bg: #0f172a;
      --bg-card: #1e293b;
      --bg-input: #334155;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --accent: #38bdf8;
      --accent-hover: #7dd3fc;
      --green: #4ade80;
      --red: #f87171;
      --yellow: #fbbf24;
      --border: #475569;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,.3);
      --transition: 0.2s ease;
    }

    body.light {
      --bg: #f8fafc;
      --bg-card: #ffffff;
      --bg-input: #f1f5f9;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #cbd5e1;
      --shadow: 0 4px 24px rgba(0,0,0,.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      transition: background var(--transition), color var(--transition);
    }

    /* Layout */
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    header h1 { font-size: 1.75rem; font-weight: 700; }
    header h1 span { color: var(--accent); }

    .header-actions {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    /* Cards */
    .card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .card-header {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* Controls row */
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 0.75rem;
      align-items: end;
    }
    @media (max-width: 640px) {
      .controls { grid-template-columns: 1fr 1fr; }
    }

    .form-group { display: flex; flex-direction: column; gap: 0.25rem; }
    .form-group label { font-size: 0.8rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; }

    input, select, textarea, button {
      font-family: inherit;
      font-size: 0.95rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      padding: 0.6rem 0.8rem;
      background: var(--bg-input);
      color: var(--text);
      transition: all var(--transition);
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(56,189,248,.2);
    }

    button {
      cursor: pointer;
      font-weight: 600;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      justify-content: center;
    }
    .btn-primary { background: var(--accent); color: #0f172a; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--bg-input); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-sm { padding: 0.4rem 0.75rem; font-size: 0.8rem; }
    .btn-icon { background: none; border: 1px solid var(--border); padding: 0.4rem 0.6rem; color: var(--text); }
    .btn-icon:hover { background: var(--bg-input); }

    /* Question display */
    .question-box {
      background: var(--bg-input);
      border-radius: var(--radius);
      padding: 1.25rem;
      font-size: 1.15rem;
      font-weight: 500;
      margin-bottom: 1rem;
      border-left: 4px solid var(--accent);
      position: relative;
    }
    .question-box .q-label {
      position: absolute;
      top: -0.6rem;
      left: 1rem;
      background: var(--accent);
      color: #0f172a;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.15rem 0.6rem;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: .1em;
    }

    textarea {
      width: 100%;
      min-height: 140px;
      resize: vertical;
      font-size: 1rem;
    }

    /* Progress bar */
    .progress-bar {
      height: 6px;
      background: var(--bg-input);
      border-radius: 3px;
      margin: 1rem 0;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      transition: width 0.6s ease;
      width: 0%;
    }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-overlay {
      display: none;
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
    }
    .loading-overlay.active { display: block; }

    /* Scores */
    .scores-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    @media (max-width: 480px) {
      .scores-grid { grid-template-columns: repeat(2, 1fr); }
    }
    .score-card {
      text-align: center;
      padding: 0.75rem;
      border-radius: 8px;
      background: var(--bg-input);
    }
    .score-value { font-size: 1.5rem; font-weight: 700; }
    .score-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; }
    .score-card.high .score-value { color: var(--green); }
    .score-card.mid .score-value { color: var(--yellow); }
    .score-card.low .score-value { color: var(--red); }

    /* Feedback sections */
    .feedback-section { margin-top: 1rem; }
    .feedback-section h4 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 0.4rem; color: var(--text-muted); }
    .feedback-section ul { padding-left: 1.2rem; }
    .feedback-section li { margin-bottom: 0.3rem; }

    .model-answer-box {
      background: var(--bg-input);
      border-radius: 8px;
      padding: 1rem;
      font-size: 0.9rem;
      white-space: pre-wrap;
      line-height: 1.7;
      margin-top: 0.5rem;
      border-left: 3px solid var(--green);
    }

    /* Session history sidebar */
    .layout {
      display: grid;
      grid-template-columns: 1fr 260px;
      gap: 1.5rem;
      align-items: start;
    }
    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; }
    }

    .sidebar {
      position: sticky;
      top: 1.5rem;
    }
    .sidebar .card { padding: 1rem; }
    .sidebar h3 { font-size: 0.9rem; margin-bottom: 0.75rem; color: var(--text-muted); }
    .history-item {
      padding: 0.5rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      margin-bottom: 0.3rem;
      border: 1px solid transparent;
      transition: all var(--transition);
    }
    .history-item:hover, .history-item.active {
      background: var(--bg-input);
      border-color: var(--accent);
    }
    .history-item .hist-date { color: var(--text-muted); font-size: 0.7rem; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: var(--bg-card);
      color: var(--text);
      padding: 0.8rem 1.2rem;
      border-radius: 8px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      z-index: 999;
      animation: slideIn 0.3s ease;
      font-size: 0.9rem;
    }
    @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* Utility */
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header>
      <h1>&#x1F3AF; <span>Interview</span> Practice</h1>
      <div class="header-actions">
        <button class="btn-icon btn-sm" id="themeToggle" title="Toggle dark/light mode">&#x2600;&#xFE0F;</button>
        <button class="btn-secondary btn-sm" id="newSessionBtn">&#x2795; New Session</button>
      </div>
    </header>

    <!-- Main layout -->
    <div class="layout">
      <!-- Main content -->
      <main id="mainContent">
        <!-- Controls -->
        <div class="card">
          <div class="controls">
            <div class="form-group">
              <label for="roleInput">Role</label>
              <input id="roleInput" value="Python Developer" placeholder="e.g. DevOps Engineer">
            </div>
            <div class="form-group">
              <label for="difficultyInput">Difficulty</label>
              <select id="difficultyInput">
                <option value="easy">&#x1F7E2; Easy</option>
                <option value="medium" selected>&#x1F7E1; Medium</option>
                <option value="hard">&#x1F534; Hard</option>
              </select>
            </div>
            <div class="form-group">
              <label for="topicInput">Topic (optional)</label>
              <input id="topicInput" placeholder="e.g. Django ORM">
            </div>
            <button class="btn-primary" id="generateBtn">&#x2728; Generate</button>
          </div>
          <div class="progress-bar hidden" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>

        <!-- Question -->
        <div class="card hidden" id="questionCard">
          <div class="question-box">
            <span class="q-label">Question</span>
            <span id="questionText">Click Generate to get started!</span>
          </div>
          <div class="form-group">
            <label for="answerInput">Your Answer</label>
            <textarea id="answerInput" placeholder="Type your answer here..."></textarea>
          </div>
          <button class="btn-primary" id="evaluateBtn" style="width:100%;margin-top:0.5rem;">
            &#x1F50D; Evaluate & Get Coaching
          </button>
          <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
            <p style="margin-top:0.5rem;">Evaluating your answer...</p>
          </div>
        </div>

        <!-- Results -->
        <div class="card hidden" id="resultsCard">
          <div class="card-header">&#x1F4CA; Results</div>
          <div class="scores-grid" id="scoresGrid"></div>
          <div id="feedbackContent"></div>
        </div>
      </main>

      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="card">
          <h3>&#x1F4C4; Session History</h3>
          <div id="historyList">
            <p style="color:var(--text-muted);font-size:0.8rem;">No sessions yet. Generate a question to start!</p>
          </div>
          <button class="btn-secondary btn-sm" id="refreshHistoryBtn" style="margin-top:0.5rem;width:100%;">&#x21BB; Refresh</button>
        </div>
      </aside>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toastContainer"></div>

  <script src="/static/app.js"></script>
</body>
</html>
